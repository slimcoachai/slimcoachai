<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>SlimCoach AI</title><style>*{box-sizing:border-box;margin:0;padding:0}body{background:#0a0a0a;color:#fff;font-family:Georgia,serif;display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto}#header{padding:16px;background:#111;border-bottom:2px solid #22c55e;font-size:18px;font-weight:700}#header span{color:#22c55e}#messages{flex:1;padding:16px;overflow-y:auto;display:flex;flex-direction:column;gap:12px}#messages div{max-width:80%;padding:10px 14px;border-radius:12px;font-size:14px;white-space:pre-wrap;line-height:1.5}.user{background:#22c55e;align-self:flex-end}.bot{background:#222;align-self:flex-start}#input-area{padding:12px;background:#111;border-top:1px solid #333;display:flex;gap:8px}#msg{flex:1;background:#222;border:1px solid #333;color:#fff;padding:8px 12px;border-radius:20px;font-size:14px;outline:none}#btn{background:#22c55e;border:none;color:#fff;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:18px}</style></head><body><div id="header">SlimCoach <span>AI</span> 🔥</div><div id="messages"><div class="bot">Hola! Soy SlimCoach AI. Tu coach personal para bajar de peso. Como te llamas y cual es tu meta?</div></div><div id="input-area"><input id="msg" placeholder="Escribele a tu coach..." onkeydown="if(event.key==='Enter')send()"><button id="btn" onclick="send()">↑</button></div><script>let hist=[{role:'assistant',content:'Hola! Soy SlimCoach AI. Tu coach personal para bajar de peso. Como te llamas y cual es tu meta?'}];async function send(){const i=document.getElementById('msg');const m=document.getElementById('messages');const t=i.value.trim();if(!t)return;i.value='';const ud=document.createElement('div');ud.className='user';ud.textContent=t;m.appendChild(ud);hist.push({role:'user',content:t});const body=JSON.stringify({model:'claude-sonnet-4-5',max_tokens:1000,system:'Eres SlimCoach AI, coach experto en perdida de peso y nutricion keto. Crea planes personalizados. Responde en espanol.',messages:hist});try{const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:body});const d=await r.json();const reply=d.content?.[0]?.text||JSON.stringify(d);hist.push({role:'assistant',content:reply});const bd=document.createElement('div');bd.className='bot';bd.textContent=reply;m.appendChild(bd);}catch(e){const bd=document.createElement('div');bd.className='bot';bd.textContent='Error: '+e.message;m.appendChild(bd);}m.scrollTop=m.scrollHeight;}</script></body></html>

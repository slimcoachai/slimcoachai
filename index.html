<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>SlimCoach AI</title><style>*{box-sizing:border-box;margin:0;padding:0}body{background:#0a0a0a;color:#fff;font-family:Georgia,serif;display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto}#header{padding:16px;background:#111;border-bottom:2px solid #e8a923;font-size:18px;font-weight:700}#header span{color:#e8a923}#messages{flex:1;padding:16px;overflow-y:auto;display:flex;flex-direction:column;gap:12px}#messages div{max-width:80%;padding:10px 14px;border-radius:12px;font-size:14px;white-space:pre-wrap;line-height:1.5}.user{background:#e8a923;color:#0a0a0a;align-self:flex-end}.bot{background:#222;align-self:flex-start}#input-area{padding:12px;background:#111;border-top:1px solid #333;display:flex;gap:8px}#msg{flex:1;background:#222;border:1px solid #333;color:#fff;padding:8px 12px;border-radius:20px;font-size:14px;outline:none}#btn{background:#e8a923;border:none;color:#0a0a0a;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:18px}</style></head><body><div id="header">SlimCoach <span>AI</span> 🥚</div><div id="messages"><div class="bot">¡Hola! Soy SlimCoach AI 🥚 Tu coach personal para bajar de peso con el Método SlimCoach. ¿Cómo te llamas y cuál es tu meta?</div></div><div id="input-area"><input id="msg" placeholder="Escríbele a tu coach..." onkeydown="if(event.key==='Enter')send()"><button id="btn" onclick="send()">↑</button></div><script>let hist=[{role:'assistant',content:'¡Hola! Soy SlimCoach AI 🥚 Tu coach personal para bajar de peso con el Método SlimCoach. ¿Cómo te llamas y cuál es tu meta?'}];async function send(){const i=document.getElementById('msg');const m=document.getElementById('messages');const t=i.value.trim();if(!t)return;i.value='';const ud=document.createElement('div');ud.className='user';ud.textContent=t;m.appendChild(ud);hist.push({role:'user',content:t});const systemPrompt=`Eres SlimCoach AI, un coach personal de pérdida de peso que usa el Método SlimCoach basado en experiencia propia. El creador bajó de 264 a 225 libras y las ha mantenido por casi 4 años.

MÉTODO SLIMCOACH - LOS 5 PILARES:
1. 🥚 EL HUEVO ES LA ESTRELLA: consumir entre 5 a 8 huevos diarios en cualquier presentación (revueltos, fritos, duros, tortilla, pochados, omelette)
2. 🥩 PROTEÍNA ANIMAL COMO BASE: carnes rojas, pollo, pescado, mariscos, tocino/bacon, chicharrones de cerdo, sardinas, atún
3. 🥑 GRASAS BUENAS: aguacate, aceite de oliva extra virgen, mantequilla, queso
4. ⏰ AYUNO INTERMITENTE: 12 a 14 horas sin comer. La última comida debe ser ANTES de que se oculte el sol
5. 💧 AGUA SLIMCOACH: mínimo 3 litros al día con 2 gramos de sal marina y medio limón por cada litro

LO QUE SE ELIMINA COMPLETAMENTE:
- Harinas, pan, arroz, pastas, granos
- Azúcar en cualquier forma
- Carbohidratos refinados
- Frutas altas en azúcar

REGLAS IMPORTANTES:
- NUNCA uses la palabra "keto" ni "cetogénico" — este es el Método SlimCoach
- NUNCA recomiendes ir al gym — el plan es caminar 20-30 minutos al día, preferiblemente en ayuno
- SIEMPRE recomienda consultar al médico antes de iniciar
- Responde SIEMPRE en español
- Sé motivador, cercano y práctico
- Da recetas simples con los alimentos del método
- Si alguien tiene ansiedad entre comidas, recomienda chicharrones de cerdo

Cuando des un plan de comidas incluye siempre: desayuno, almuerzo y cena (sin merienda). Cada comida debe tener huevos o proteína animal, grasa buena y cero carbohidratos.`;const body=JSON.stringify({model:'claude-sonnet-4-5',max_tokens:1000,system:systemPrompt,messages:hist});try{const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:body});const d=await r.json();const reply=d.content?.[0]?.text||JSON.stringify(d);hist.push({role:'assistant',content:reply});const bd=document.createElement('div');bd.className='bot';bd.textContent=reply;m.appendChild(bd);}catch(e){const bd=document.createElement('div');bd.className='bot';bd.textContent='Error: '+e.message;m.appendChild(bd);}m.scrollTop=m.scrollHeight;}</script></body></html>
